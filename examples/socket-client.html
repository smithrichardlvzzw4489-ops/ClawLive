<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawLive Socket.io 测试</title>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        #messages {
            border: 1px solid #ddd;
            height: 400px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
            background: #f9f9f9;
        }
        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 5px;
        }
        .user { background: #ee5a6f; color: white; }
        .agent { background: #e9d5ff; color: #581c87; }
        .system { background: #e5e7eb; color: #374151; }
        .comment { background: #fef3c7; color: #92400e; }
        .log { background: #dbeafe; color: #1e40af; }
        input, button {
            padding: 10px;
            margin: 5px;
        }
        button {
            background: #ee5a6f;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #c92a2a;
        }
        #status {
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        .connected { background: #d1fae5; color: #065f46; }
        .disconnected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <h1>🦞 ClawLive Socket.io 测试</h1>
    
    <div id="status" class="disconnected">未连接</div>
    
    <div>
        <label>房间 ID: <input type="text" id="roomId" value="test-room"></label>
        <button onclick="joinRoom()">加入房间</button>
        <button onclick="leaveRoom()">离开房间</button>
    </div>
    
    <div id="messages"></div>
    
    <div>
        <label>昵称: <input type="text" id="nickname" value="测试观众"></label>
        <label>弹幕: <input type="text" id="comment" placeholder="输入弹幕"></label>
        <button onclick="sendComment()">发送弹幕</button>
    </div>
    
    <div style="margin-top: 20px;">
        <p><strong>观众数:</strong> <span id="viewerCount">0</span></p>
    </div>

    <script>
        const socket = io('http://localhost:3001');
        const messagesDiv = document.getElementById('messages');
        const statusDiv = document.getElementById('status');
        const viewerCountSpan = document.getElementById('viewerCount');
        let currentRoomId = null;

        socket.on('connect', () => {
            console.log('Socket connected');
            statusDiv.textContent = '已连接 ✅';
            statusDiv.className = 'connected';
        });

        socket.on('disconnect', () => {
            console.log('Socket disconnected');
            statusDiv.textContent = '已断开 ❌';
            statusDiv.className = 'disconnected';
        });

        socket.on('room-info', (room) => {
            console.log('Room info:', room);
            addMessage('system', `加入房间: ${room.title}`);
        });

        socket.on('message-history', (messages) => {
            console.log('Message history:', messages);
            messagesDiv.innerHTML = '';
            messages.forEach(msg => {
                addMessage(msg.sender, msg.content, msg.timestamp);
            });
        });

        socket.on('new-message', (msg) => {
            console.log('New message:', msg);
            addMessage(msg.sender, msg.content, msg.timestamp);
        });

        socket.on('new-log', (log) => {
            console.log('New log:', log);
            addMessage('log', `${log.status === 'success' ? '✅' : log.status === 'error' ? '❌' : '⏳'} ${log.action}`, log.timestamp);
        });

        socket.on('new-comment', (comment) => {
            console.log('New comment:', comment);
            addMessage('comment', `${comment.nickname}: ${comment.content}`, comment.timestamp);
        });

        socket.on('viewer-count-update', (count) => {
            console.log('Viewer count:', count);
            viewerCountSpan.textContent = count;
        });

        socket.on('room-status-change', (status) => {
            console.log('Room status:', status);
            addMessage('system', `房间状态: ${status.isLive ? '开始直播' : '停止直播'}`);
        });

        socket.on('error', (error) => {
            console.error('Socket error:', error);
            addMessage('system', `错误: ${error.message}`);
        });

        function joinRoom() {
            const roomId = document.getElementById('roomId').value;
            if (!roomId) {
                alert('请输入房间 ID');
                return;
            }
            
            if (currentRoomId) {
                leaveRoom();
            }
            
            currentRoomId = roomId;
            socket.emit('join-room', { roomId, role: 'viewer' });
            addMessage('system', `正在加入房间: ${roomId}`);
        }

        function leaveRoom() {
            if (!currentRoomId) return;
            
            socket.emit('leave-room', { roomId: currentRoomId });
            addMessage('system', `离开房间: ${currentRoomId}`);
            currentRoomId = null;
        }

        function sendComment() {
            if (!currentRoomId) {
                alert('请先加入房间');
                return;
            }
            
            const nickname = document.getElementById('nickname').value || '匿名';
            const content = document.getElementById('comment').value;
            
            if (!content) {
                alert('请输入弹幕内容');
                return;
            }
            
            socket.emit('send-comment', {
                roomId: currentRoomId,
                nickname,
                content,
            });
            
            document.getElementById('comment').value = '';
        }

        function addMessage(type, content, timestamp) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            
            const time = timestamp ? new Date(timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();
            div.innerHTML = `<small>${time}</small><br>${content}`;
            
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        document.getElementById('comment').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendComment();
            }
        });
    </script>
</body>
</html>
